<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ToDoリスト</title>
  <link rel="stylesheet" href="css/style.css">

  <!-- Firebase -->
</head>

<body>
  <a href="home.html" class="menu-btn">← ホームに戻る</a>

  <div class="character-area">
    <div id="bubble" class="bubble">ToDoリストを読み込んでいるよ…</div>
    <img id="character" src="img/character_normal.png" class="character">
  </div>

  <div class="container">
    <h2>ToDoリスト</h2>

    <!-- 追加欄 -->
    <div class="add-item">
      <input id="todoInput" type="text" placeholder="やることを入力">

      <select id="todoCategory">
        <option value="urgent">優先度：高</option>
        <option value="find">普通</option>
        <option value="later">低め</option>
      </select>

      <div class="add-buttons">
        <button id="addTodoBtn" class="action-btn">追加</button>
        <button id="sortTodoBtn" class="action-btn">並べ替え</button>
      </div>
    </div>

    <!-- リスト表示 -->
    <div id="todoList"></div>

    <br>
    <a href="home.html" class="menu-btn">← ホームに戻る</a>
  </div>

    <!-- Firebase SDK (compat版 v10) -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <!-- 共通ユーティリティ + Firebase 初期化 -->
  <script src="js/common.js"></script>
  <script src="js/firebase.js"></script>
  <script src="js/todo.js"></script>
</body>
</html>
