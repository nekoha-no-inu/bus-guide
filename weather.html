<!DOCTYPE html>
<html lang="ja">
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta charset="UTF-8">
  <title>天気予報</title>
  <link rel="stylesheet" href="css/style.css">

  <style>

  </style>
</head>
<body>
  <a href="home.html" class="menu-btn">← ホームに戻る</a>
  <div class="character-area">
    <div id="bubble" class="bubble">天気を読み込んでいるよ…</div>
    <img id="character" src="img/character_normal.png" class="character">
  </div>

  <div id="cityButtons">
    <button onclick="changeCity('kiyose')" class="active">清瀬市</button>
    <button onclick="changeCity('fukuoka')">福岡市</button>
    <button onclick="changeCity('toyama')">富山市</button>
  </div>

  <h2 id="cityTitle">の今日と明日の天気</h2>

  <div class="weather-row">
    <div id="todayCard" class="weather-card"></div>
    <div id="tomorrowCard" class="weather-card"></div>
  </div>

  <h2 id="weekTitle">の週間天気予報</h2>
  <div class="week-scroll">
    <table class="week-table" id="weekTable"></table>
  </div>

  <script src="js/common.js"></script>
  <script src="js/weather.js"></script>

</body>
</html>
