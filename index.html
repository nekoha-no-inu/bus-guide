<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>簡易乗換案内</title>

<style>
body {
  font-family: sans-serif;
  margin: 0;
  background: #f5f5f5;
}

/* キャラクター案内 */
/* キャラクター案内（縦並び） */

/* キャラクター画像のサイズ（自由に変更可能） */
#guide {
  display: flex;
  flex-direction: row;   /* 横並び */
  align-items: flex-start;
  gap: 20px;
  margin-top: 10px;
}

/* 左側の吹き出し＋キャラを縦並びに */
#leftBlock {
  display: flex;
  flex-direction: column;
  align-items: center; /* キャラと吹き出しを中央揃え */
  gap: 10px;
}

/* 吹き出し */
#bubble {
  max-width: 260px;
  padding: 10px;
  background: #ffffff;
  border-radius: 10px;
  border: 2px solid #333;
}

/* キャラ画像 */
#character {
  width: 120px;
  height: auto;
}

/* ルートカード */
#routeCard {
  background: #fff;
  border: 2px solid #333;
  border-radius: 10px;
  padding: 12px;
  width: 200px;
  line-height: 1.6;
  display: none;
}


/* 入力フォーム */
#controls {
  padding: 12px;
  background: #fff;
}
label {
  display: block;
  margin-top: 10px;
}

/* 方向切替 */
#modeButtons button {
  margin: 5px 3px;
  padding: 8px 12px;
  border: none;
  background: #ddd;
  border-radius: 6px;
}
#modeButtons button.active {
  background: #4caf50;
  color: #fff;
}

/* 結果カード */
.result {
  background: #fff;
  margin: 12px;
  padding: 12px;
  border-radius: 8px;
  border-left: 6px solid #4caf50;
}
.result h3 {
  margin: 0;
}
</style>
</head>

<body>

<!-- キャラクター案内 -->
<div id="guide">

  <!-- 左側：吹き出し＋キャラを縦に並べる -->
  <div id="leftBlock">
    <div id="bubble"></div>
    <img id="character" src="character_normal.png">
  </div>

  <!-- 右側：ルートカード -->
  <div id="routeCard"></div>

</div>




<!-- 入力フォーム -->
<div id="controls">
  <label>出発日時:
    <input type="datetime-local" id="datetime">
  </label>
  <button id="nowButton" style="margin-top:10px;padding:10px 20px;">
    現在時刻に更新
  </button>

  <div id="modeButtons">
    <button data-mode="自宅→清瀬駅" class="active">自宅→清瀬駅</button>
    <button data-mode="自宅→新座駅">自宅→新座駅</button>
    <button data-mode="清瀬駅→自宅">清瀬駅→自宅</button>
    <button data-mode="新座駅→自宅">新座駅→自宅</button>
  </div>

  <button onclick="searchBus()" style="margin-top:10px;padding:10px 20px;">検索</button>
</div>

<div id="dayTypeDisplay" style="padding:12px; font-size:16px; color:#333;"></div>
<div id="results"></div>

<script>
// ----------------------------
// Google 日本の祝日 API
// ----------------------------
const HOLIDAY_API =
  "https://www.googleapis.com/calendar/v3/calendars/japanese__ja@holiday.calendar.google.com/events?key=AIzaSyCCQB3KoCaFIvG1Wf8xy7y03d1ACHjqpsU";

let holidayList = [];

async function loadHolidays() {
  const res = await fetch(HOLIDAY_API);
  const data = await res.json();

  // 祝日の日付だけを配列にする
  holidayList = data.items
    .filter(ev => ev.start && ev.start.date)
    .map(ev => ev.start.date);

  console.log("Google祝日:", holidayList);
}

// ----------------------------
// CSV 読み込み
// ----------------------------
let routes = [];
let schedules = [];

async function loadCSV() {
  routes = await fetch("routes.csv").then(r => r.text()).then(parseCSV);
  schedules = await fetch("schedules.csv").then(r => r.text()).then(parseCSV);

  console.log("routes:", routes);
  console.log("schedules:", schedules);
}

// CSV → 配列（trim 対応）
function parseCSV(text) {
  const lines = text.trim().split("\n");
  const header = lines[0].split(",").map(h => h.trim());
  return lines.slice(1).map(line => {
    const cols = line.split(",").map(c => c.trim());
    const obj = {};
    header.forEach((h,i)=> obj[h] = cols[i]);
    return obj;
  });
}

// ----------------------------
// 祝日判定
// ----------------------------
function isHoliday(date) {
  const y = date.getFullYear();
  const m = String(date.getMonth() + 1).padStart(2, "0");
  const d = String(date.getDate()).padStart(2, "0");
  const key = `${y}-${m}-${d}`;
  return holidayList.includes(key);
}

function getDayType(date) {
  const day = date.getDay(); // 0=日曜, 6=土曜
  if (isHoliday(date)) return "休日";
  if (day === 0) return "休日";
  if (day === 6) return "土曜";
  return "平日";
}

// ----------------------------
// 時刻比較
// ----------------------------
function toMinutes(t) {
  const [h,m] = t.split(":").map(Number);
  return h*60 + m;
}
function minutesToTime(m) {
  const h = String(Math.floor(m/60)).padStart(2,"0");
  const mm = String(m%60).padStart(2,"0");
  return `${h}:${mm}`;
}
function setDatetimeNow() {
  const now = new Date();
  const y = now.getFullYear();
  const m = String(now.getMonth() + 1).padStart(2, "0");
  const d = String(now.getDate()).padStart(2, "0");
  const hh = String(now.getHours()).padStart(2, "0");
  const mm = String(now.getMinutes()).padStart(2, "0");

  document.getElementById("datetime").value = `${y}-${m}-${d}T${hh}:${mm}`;
}

function getJSTDatetime() {
  const val = document.getElementById("datetime").value; // "2026-04-29T18:00"
  if (!val) return new Date();

  const [datePart, timePart] = val.split("T");
  const [y, m, d] = datePart.split("-").map(Number);
  const [hh, mm] = timePart.split(":").map(Number);

  // ★ ここが重要：new Date(y, m-1, d, hh, mm) はローカル(JST)で生成される
  return new Date(y, m - 1, d, hh, mm);
}


// 初期値：現在時刻
setDatetimeNow();

// 現在時刻に更新ボタン
document.getElementById("nowButton").onclick = () => {
  setDatetimeNow();
};

//表情差分
function setCharacterExpression(type) {
  const img = document.getElementById("character");
  if (type === "hurry") img.src = "character_hurry.png";
  else if (type === "relax") img.src = "character_relax.png";
  else img.src = "character_normal.png";
}


// ----------------------------
// メイン処理
// ----------------------------
function searchBus() {
  const dt = getJSTDatetime();   // ★ JSTで取得
  const mode = document.querySelector("#modeButtons .active").dataset.mode;
  const dayType = getDayType(dt);
  const isFromHome = mode.startsWith("自宅→");   // 行き
  const isToHome   = mode.endsWith("→自宅");     // 帰り

  document.getElementById("routeCard").style.display = "block";
  document.getElementById("dayTypeDisplay").innerText =
    `この日は「${dayType}」ダイヤです`;

  const startMin = dt.getHours()*60 + dt.getMinutes();

  const candidates = [];

  routes.filter(r => r.mode === mode).forEach(r => {
    const walkArrive = startMin + Number(r.walk_min);

    const list = schedules.filter(s =>
      s.route === r.line &&
      s.stop === r.stop &&
      s.direction === r.direction &&
      s.day_type === dayType &&
      toMinutes(s.depart_time) >= walkArrive
    );

    if (list.length === 0) return;

    const nextBus = list[0];
    const busDepart = toMinutes(nextBus.depart_time);
    const arrive = busDepart + Number(r.ride_min);

    // ★ 降車バス停を自動判定
    let getoffStop = "";

    if (mode.startsWith("自宅→")) {
      // 行き：同じ line の「駅→自宅」側の stop を探す
      const pair = routes.find(r2 =>
        r2.line === r.line &&
        r2.mode.endsWith("→自宅")
      );
      if (pair) getoffStop = pair.stop;
    }

    if (mode.endsWith("→自宅")) {
      // 帰り：同じ line の「自宅→駅」側の stop を探す
      const pair = routes.find(r2 =>
        r2.line === r.line &&
        r2.mode.startsWith("自宅→")
      );
      if (pair) getoffStop = pair.stop;
    }

    candidates.push({
      line: r.line,
      stop: r.stop,
      getoff: getoffStop, 
      depart: nextBus.depart_time,
      arrive: minutesToTime(arrive),
      walk: r.walk_min,
      ride: r.ride_min
    });
  });

  candidates.sort((a,b)=> toMinutes(a.arrive)-toMinutes(b.arrive));

  const results = document.getElementById("results");
  results.innerHTML = "";

candidates.forEach((c,i)=>{
  const isFromHome = mode.startsWith("自宅→");   // 行き
  const isToHome   = mode.endsWith("→自宅");     // 帰り

  let detailText = "";

  if (isFromHome) {
    // 行き：家を出る時刻 = バス発車時刻 - 徒歩時間
    const departMin = toMinutes(c.depart);
    const leaveMin = departMin - Number(c.walk);
    const leaveTime = minutesToTime(leaveMin);

    detailText =
      `家を出る時刻：<b>${leaveTime}</b><br>` +
      `バス発車時刻：<b>${c.depart}</b><br>` +
      `駅到着時刻：<b>${c.arrive}</b><br>` +
      `徒歩 ${c.walk}分 + 乗車 ${c.ride}分`;
  }

  if (isToHome) {
    // 帰り：最終到着時刻 = バス到着時刻 + 徒歩時間
    const arriveMin = toMinutes(c.arrive);
    const finalArriveMin = arriveMin + Number(c.walk);
    const finalArrive = minutesToTime(finalArriveMin);

    detailText =
      `バス到着時刻：<b>${c.arrive}</b>（${c.getoff}）<br>` +
      `自宅到着時刻：<b>${finalArrive}</b><br>` +
      `乗車 ${c.ride}分 + 徒歩 ${c.walk}分`;
  }

  results.innerHTML += `
    <div class="result">
      <h3>${i===0 ? "【最速】" : ""}${c.line}（${c.stop}）</h3>
      ${detailText}
    </div>
  `;
});

// ★ 吹き出しに要約を表示（方向別 + セリフ変化 + 表情 + 徒歩コメント）
if (candidates.length > 0) {
  const best = candidates[0];

  const isFromHome = mode.startsWith("自宅→");   // 行き
  const isToHome   = mode.endsWith("→自宅");     // 帰り

  const baseMin = startMin;  // 設定した時刻
  const departMin = toMinutes(best.depart);
  const diff = departMin - baseMin;

  let message = "";
  let expression = "normal";
  let walkComment = "";

  // 徒歩が長い場合の追加コメント
  if (Number(best.walk) >= 10) {
    walkComment = " <br>歩く時間が長いから気をつけてね。";
  }

  if (isFromHome) {
    // 家を出るまでの残り時間
    const leaveDiff = diff - Number(best.walk);

    // 行きのセリフ分岐
    if (leaveDiff <= 10) {
      message =
        `あと<b>${leaveDiff}分</b>で家を出て、<b>${diff}分後</b>に「<b>${best.stop}</b>」から出る<b>${best.line}</b>系統に乗ってね。`+
        `<br>急げば間に合うよ！` +
        `<br>駅に着くのは<b>` + best.arrive + `</b>頃だよ。`;
      expression = "hurry";
    } else if (leaveDiff <= 20) {
      message =
        `<b>${leaveDiff}分後</b>に家を出れば、<b>${diff}分後</b>に「<b>${best.stop}</b>」から出る<b>${best.line}</b>系統のバスに余裕で間に合うよ。`+
        `<br>ちょうどいいタイミングだよ。` +
        `<br>駅に着くのは<b>` + best.arrive + `</b>頃だよ。`;
      expression = "normal";
    } else {
      message =
        `<b>${leaveDiff}分後</b>に家を出れば、<b>${diff}分後</b>に「<b>${best.stop}</b>」から出る<b>${best.line}</b>系統のバスに間に合うよ。`+
        `<br>のんびり準備して大丈夫だよ。` +
        `<br>駅に着くのは<b>` + best.arrive + `</b>頃だよ。`;
      expression = "relax";
    }

    document.getElementById("bubble").innerHTML = message + walkComment;
    setCharacterExpression(expression);
  }

  if (isToHome) {
    // 帰りのセリフ分岐
    if (diff <= 10) {
      message =
        `<b>${diff}分後</b>に「<b>${best.stop}</b>」から出る<b>${best.line}</b>系統に乗れば、早く家に帰れるよ。`+
        `<br>ちょうどいいタイミングだよ！` +
        `<br>家に着くのは<b>` + best.arrive + `</b>頃だよ。`;
      expression = "normal";
    } else {
      message =
        `<b>${diff}分後</b>に「<b>${best.stop}</b>」から出る<b>${best.line}</b>系統が一番早いよ。`+
        `<br>ちょっと待ち時間が長いね…` +
        `<br>家に着くのは<b>` + best.arrive + `</b>頃だよ。`;
      expression = "relax";
    }

    document.getElementById("bubble").innerHTML = message + walkComment;
    setCharacterExpression(expression);
  }
  // ★ ルートカード生成
const routeCard = document.getElementById("routeCard");
routeCard.style.display = "block";

let stationName = "";
if (mode.includes("清瀬駅")) stationName = "清瀬駅";
if (mode.includes("新座駅")) stationName = "新座駅";

if (isFromHome) {
  const departMin = toMinutes(best.depart);
  const leaveMin = departMin - Number(best.walk);
  const leaveTime = minutesToTime(leaveMin);

  routeCard.innerHTML =
    `<b>自宅</b> ： ${leaveTime}<br>` +
    `↓ 徒歩 ${best.walk}分<br>` +
    `<b>${best.stop}</b> ： ${best.depart}<br>` +
    `↓ 乗車 ${best.ride}分<br>` +
    `<b>${stationName}</b> ： ${best.arrive}`;
}

if (isToHome) {
  const arriveMin = toMinutes(best.arrive);
  const finalArriveMin = arriveMin + Number(best.walk);
  const finalArrive = minutesToTime(finalArriveMin);

  routeCard.innerHTML =
    `<b>${stationName}</b> ： ${best.depart}<br>` +
    `↓ 乗車 ${best.ride}分<br>` +
    `<b>${best.getoff}</b> ： ${best.arrive}<br>` +
    `↓ 徒歩 ${best.walk}分<br>` +
    `<b>自宅</b> ： ${finalArrive}`;
}

} else {
  document.getElementById("bubble").innerText =
    `ごめんね、この時間帯はバスが見つからなかったよ。`;
  setCharacterExpression("normal");
}





}

// 方向ボタン
document.querySelectorAll("#modeButtons button").forEach(btn=>{
  btn.onclick = ()=>{
    document.querySelectorAll("#modeButtons button").forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");
  };
});

window.onload = () => {
  document.getElementById("bubble").innerHTML =
    "行き先と時刻を選んで検索してね！";
};


// ページ読み込み時に CSV を読み込む
loadCSV();
loadHolidays();

</script>

</body>
</html>
