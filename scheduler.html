<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>スケジューラー</title>
  <link rel="stylesheet" href="css/style.css">

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
</head>

<body>
  <a href="home.html" class="menu-btn">← ホームに戻る</a>

  <div class="character-area">
    <div id="bubble" class="bubble">予定を読み込んでいるよ…</div>
    <img id="character" src="img/character_normal.png" class="character">
  </div>

  <div class="container">
    <h2>スケジューラー</h2>

    <!-- 追加欄 -->
    <div class="add-item">
      <input id="scheduleInput" type="text" placeholder="予定を入力">

      <input id="scheduleDate" type="date">

      <div class="add-buttons">
        <button id="addScheduleBtn" class="action-btn">追加</button>
        <button id="sortScheduleBtn" class="action-btn">並べ替え</button>
      </div>
    </div>

    <!-- リスト表示 -->
    <div id="scheduleList"></div>

    <br>
    <a href="home.html" class="menu-btn">← ホームに戻る</a>
  </div>

  <script src="js/scheduler.js"></script>
</body>
</html>
