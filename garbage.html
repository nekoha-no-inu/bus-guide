<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>ごみ収集日</title>
  <link rel="stylesheet" href="css/style.css">

  <style>
    .garbage-card {
        background: #f5f5f5;
        padding: 15px;
        margin: 10px auto;   /* ← 中央寄せ */
        border-radius: 10px;
        max-width: 300px;    /* ← 横幅を制限 */
    }
    .garbage-title {
      font-size: 1.2em;
      margin: 10px auto;   /* ← 中央寄せ */
      font-weight: bold;
      margin-bottom: 5px;
      max-width: 300px;    /* ← 横幅を制限 */
    }
    /* ごみ収集ページ専用：キャラ案内を縦並びにする */
    .character-area {
        display: flex;
        flex-direction: column;
        align-items: center;
        max-width: 300px;   /* ← ここで横幅を制限 */
        margin: 0 auto;
    }

    .character-area #bubble {
        max-width: 100%;
    }

    .character-area #character {
        width: 120px;
    }
    #weekGarbage, #todayGarbage {
        max-width: 300px;
        margin: 0 auto;
    }

  </style>
</head>
<body>
  <a href="home.html" class="menu-btn">← ホームに戻る</a>
  <div class="character-area">
    <div id="bubble" class="bubble">収集日を確認しているよ…</div>
    <img id="character" src="img/character_normal.png" class="character">
  </div>

  <h2>今日のごみ収集</h2>
  <div id="todayGarbage" class="garbage-card"></div>

  <h2>今週の収集スケジュール</h2>
  <div id="weekGarbage"></div>

    <h2>ゴミの出し方</h2>
        <a href="https://www.city.kiyose.lg.jp/kurashi/gomi/gomi/1007406/index.html" class="menu-btn">
        清瀬市HP（ゴミの出し方）
        </a>


  <script src="js/common.js"></script>
  <script src="js/garbage.js"></script>

</body>
</html>
