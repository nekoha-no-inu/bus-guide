<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>バス乗換案内</title>
<link rel="stylesheet" href="css/style.css">
<link rel="manifest" href="manifest.json">
<style>
  #guide {
    display: flex;
    flex-direction: row;
    align-items: flex-start;
    gap: 20px;
    margin-top: 10px;
  }
  #leftBlock {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
  }
  #routeCard {
    background: #fff;
    border: 2px solid #333;
    border-radius: 10px;
    padding: 12px;
    width: 200px;
    line-height: 1.8;
    display: none;
  }
  /* 前/次ボタン */
  #navButtons {
    display: flex;
    gap: 10px;
    margin-top: 8px;
  }
  #prevBtn, #nextBtn {
    flex: 1;
    padding: 10px;
    font-size: 15px;
    border-radius: 8px;
    border: 2px solid var(--primary, #4caf50);
    background: #fff;
    color: var(--primary, #4caf50);
    cursor: pointer;
  }
  #prevBtn:disabled, #nextBtn:disabled {
    opacity: 0.3;
    cursor: default;
  }
</style>
</head>
<body>

<a href="home.html" class="menu-btn">← ホームに戻る</a>

<div id="guide">
  <div id="leftBlock">
    <div class="character-area">
      <div id="bubble" class="bubble">…</div>
      <img id="character" src="img/character_normal.png" class="character">
    </div>
  </div>
  <div id="routeCard"></div>
</div>

<div id="controls">
  <label>出発日時：
    <input type="datetime-local" id="datetime">
  </label>
  <button id="nowButton" style="margin-top:10px;">現在時刻に更新</button>

  <div id="modeButtons">
    <button data-mode="自宅→清瀬駅" class="active">自宅→清瀬駅</button>
    <button data-mode="自宅→新座駅">自宅→新座駅</button>
    <button data-mode="清瀬駅→自宅">清瀬駅→自宅</button>
    <button data-mode="新座駅→自宅">新座駅→自宅</button>
  </div>

  <button onclick="searchBus()" style="margin-top:10px;">🔍 検索</button>
</div>

<div id="dayTypeDisplay" style="padding:8px 0; font-size:15px; color:#666;"></div>

<div id="results"></div>

<!-- 前/次ボタン -->
<div id="navButtons">
  <button id="prevBtn" disabled>◀ 前のバス</button>
  <button id="nextBtn" disabled>次のバス ▶</button>
</div>

<script src="js/common.js"></script>
<script src="js/transfer.js"></script>
<script>
  if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("service-worker.js")
      .then(() => console.log("SW registered"))
      .catch(err => console.error("SW registration failed:", err));
  }
</script>
</body>
</html>
