<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>バス乗換案内</title>
<link rel="stylesheet" href="css/style.css">
<link rel="manifest" href="manifest.json">

</head>
<style>
  /* ====== transfer.html 専用レイアウト ====== */

  /* キャラクター案内（横並び） */
  #guide {
    display: flex;
    flex-direction: row;   /* 横並び */
    align-items: flex-start;
    gap: 20px;
    margin-top: 10px;
  }

  /* 左側の吹き出し＋キャラを縦並びに */
  #leftBlock {
    display: flex;
    flex-direction: column;
    align-items: center; /* キャラと吹き出しを中央揃え */
    gap: 10px;
  }

  /* ルートカード */
  #routeCard {
    background: #fff;
    border: 2px solid #333;
    border-radius: 10px;
    padding: 12px;
    width: 200px;
    line-height: 1.6;
    display: none;
  }
</style>
<body>
<a href="home.html" class="menu-btn">← ホームに戻る</a>
<!-- キャラクター案内 -->
<div id="guide">

  <!-- 左側：吹き出し＋キャラを縦に並べる -->
  <div id="leftBlock">
    <div class="character-area">
  <div id="bubble" class="bubble">…</div>
  <img id="character" src="img/character_normal.png" class="character">
</div>
  </div>

  <!-- 右側：ルートカード -->
  <div id="routeCard"></div>

</div>



<!-- 入力フォーム -->
<div id="controls">
  <label>出発日時:
    <input type="datetime-local" id="datetime">
  </label>
  <button id="nowButton" style="margin-top:10px;padding:10px 20px;">
    現在時刻に更新
  </button>

  <div id="modeButtons">
    <button data-mode="自宅→清瀬駅" class="active">自宅→清瀬駅</button>
    <button data-mode="自宅→新座駅">自宅→新座駅</button>
    <button data-mode="清瀬駅→自宅">清瀬駅→自宅</button>
    <button data-mode="新座駅→自宅">新座駅→自宅</button>
  </div>

  <button onclick="searchBus()" style="margin-top:10px;padding:10px 20px;">検索</button>
</div>

<div id="dayTypeDisplay" style="padding:12px; font-size:16px; color:#333;"></div>
<div id="results"></div>

<script src="js/common.js"></script>
<script src="js/transfer.js"></script>

<script>
  if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("service-worker.js")
      .then(() => console.log("SW registered"))
      .catch(err => console.error("SW registration failed:", err));
  }
</script>


</body>
</html>
