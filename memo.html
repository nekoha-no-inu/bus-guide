<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>共有メモ</title>

<style>
  body {
    font-family: sans-serif;
    padding: 20px;
  }

  /* 戻るボタン（他ページと同じ想定） */
  .menu-btn {
    display: inline-block;
    padding: 10px 15px;
    background: #4CAF50;
    color: white;
    text-decoration: none;
    border-radius: 8px;
    margin-bottom: 15px;
  }

  /* キャラと吹き出し（縦配置） */
  .character-area {
    display: flex;
    flex-direction: column;
    align-items: center;
    margin-bottom: 20px;
  }

  .bubble {
    background: #fff;
    border: 2px solid #333;
    padding: 10px;
    border-radius: 10px;
    max-width: 90%;
    font-size: 14px;
    margin-bottom: 10px;
  }

  .character {
    width: 140px;
  }

  /* メモUI */
  #memoArea {
    width: 100%;
    height: 200px;
    padding: 10px;
    font-size: 16px;
    border-radius: 8px;
  }
  #saveBtn {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    font-size: 16px;
    border-radius: 8px;
  }
  #password {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
    font-size: 16px;
    border-radius: 8px;
  }
</style>
</head>

<body>

<h2>共有メモ</h2>

<!-- 戻るボタン -->
<a href="home.html" class="menu-btn">← ホームに戻る</a>

<!-- キャラと吹き出し（縦配置） -->
<div class="character-area">
  <div id="bubble" class="bubble">ここにメモを書いて保存できるよ。</div>
  <img id="character" src="img/character_normal.png" class="character">
</div>

<textarea id="memoArea" placeholder="ここにメモを書いてね"></textarea>

<input id="password" type="password" placeholder="パスワード">

<button id="saveBtn">保存</button>

<!-- Firebase SDK（compat版） -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<!-- メモ処理 -->
<script src="js/memo.js"></script>

</body>
</html>
