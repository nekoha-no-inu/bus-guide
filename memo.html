<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>共有メモ</title>
<link rel="stylesheet" href="css/style.css">
<link rel="manifest" href="manifest.json">

<style>

</style>
</head>

<body>

<h2>共有メモ</h2>

<!-- 戻るボタン -->
<a href="home.html" class="menu-btn">← ホームに戻る</a>

<!-- キャラと吹き出し（縦配置） -->
<div class="character-area">
  <div id="bubble" class="bubble">ここにメモを書いて保存できるよ。</div>
  <img id="character" src="img/character_normal.png" class="character">
</div>

<textarea id="memoArea" placeholder="ここにメモを書いてね"></textarea>

<button id="saveBtn">保存</button>

<!-- Firebase SDK（compat版） -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<!-- メモ処理 -->
 <script src="js/common.js"></script>
<script src="js/memo.js"></script>

<script>
  if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("service-worker.js")
      .then(() => console.log("SW registered"))
      .catch(err => console.error("SW registration failed:", err));
  }
</script>


</body>
</html>
