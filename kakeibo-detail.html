<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>家計簿 明細</title>
<link rel="stylesheet" href="css/style.css">
<link rel="manifest" href="manifest.json">
<style>
#filterRow { display:flex; gap:8px; margin:8px 0; flex-wrap:wrap; }
#filterRow select,
#filterRow input[type="month"] { flex:1; min-width:80px; font-size:13px; padding:6px; }
.filter-btn { padding:6px 14px; background:#4caf50; color:#fff; border:none; border-radius:6px; cursor:pointer; font-size:13px; white-space:nowrap; width:auto; }
.detail-item { background:#fff; border-radius:8px; margin:6px 0; padding:10px 12px; box-shadow:0 1px 3px rgba(0,0,0,.08); }
.detail-top  { display:flex; justify-content:space-between; align-items:flex-start; }
.detail-date { font-size:12px; color:#888; }
.detail-desc { font-size:15px; font-weight:500; margin:2px 0; }
.detail-meta { font-size:12px; color:#777; }
.detail-right { display:flex; flex-direction:column; align-items:flex-end; gap:5px; flex-shrink:0; }
.detail-amount { font-size:16px; font-weight:bold; }
.detail-amount.expense { color:#e74c3c; }
.detail-amount.income  { color:#2196F3; }
.edit-btn { padding:3px 10px; font-size:12px; border-radius:6px; border:1px solid #4caf50; color:#4caf50; background:#fff; cursor:pointer; width:auto; }

/* モーダル */
#modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.5); z-index:200; overflow-y:auto; }
#modal { background:#fff; border-radius:12px; padding:18px; margin:40px auto 40px; max-width:360px; }
#modal label { display:block; margin-top:10px; font-size:14px; }
#modal input,
#modal select { width:100%; padding:8px; font-size:14px; box-sizing:border-box; border-radius:6px; border:1px solid #ccc; margin-top:2px; }
.modal-btns { display:flex; gap:8px; margin-top:14px; }
.modal-btns button { flex:1; padding:10px; border-radius:8px; font-size:14px; cursor:pointer; border:none; width:auto; }
.btn-save   { background:#4caf50; color:#fff; }
.btn-delete { background:#e74c3c; color:#fff; }
.btn-cancel { background:#999;    color:#fff; }
#loading { text-align:center; color:#999; padding:20px; }
</style>
</head>
<body>

<a href="kakeibo.html" class="menu-btn">← 家計簿に戻る</a>

<div class="character-area">
  <div id="bubble" class="bubble">明細を確認しよう！</div>
  <img id="character" src="img/character_normal.png" class="character">
</div>

<div id="filterRow">
  <input type="month" id="f-month">
  <select id="f-type">
    <option value="">全種別</option>
    <option value="支出">支出</option>
    <option value="収入">収入</option>
  </select>
  <select id="f-person">
    <option value="">全員</option>
    <option value="みき">みき</option>
    <option value="みほ">みほ</option>
  </select>
  <button class="filter-btn" onclick="loadList()">絞り込み</button>
</div>

<div id="list"><div id="loading">読み込み中…</div></div>

<!-- 編集モーダル -->
<div id="modal-overlay" onclick="handleOverlayClick(event)">
  <div id="modal">
    <h3 style="margin:0 0 10px;font-size:16px;">明細を編集</h3>
    <label>日付</label><input type="date" id="m-date">
    <label>種別</label>
    <select id="m-type">
      <option value="支出">支出</option>
      <option value="収入">収入</option>
    </select>
    <label>大項目</label>
    <select id="m-category">
      <option>固定費</option><option>変動費</option><option>臨時出費</option>
      <option>旅費</option><option>給与</option><option>臨時収入</option>
    </select>
    <label>小項目</label><input type="text" id="m-subcategory">
    <label>内容</label><input type="text" id="m-description">
    <label>金額（円）</label><input type="number" id="m-amount">
    <label>出した人</label>
    <select id="m-person">
      <option value="みき">みき</option>
      <option value="みほ">みほ</option>
    </select>
    <div class="modal-btns">
      <button class="btn-save"   onclick="saveEdit()">💾 保存</button>
      <button class="btn-delete" onclick="confirmDelete()">🗑 削除</button>
      <button class="btn-cancel" onclick="closeModal()">キャンセル</button>
    </div>
  </div>
</div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="js/common.js"></script>
<script src="js/firebase.js"></script>
<script src="js/kakeibo-initial-data.js"></script>
<script src="js/kakeibo.js"></script>
<script>
let editingFirestoreId = null;

// 初期月セット
function setDefaultMonth() {
  const now = new Date();
  const p   = n => String(n).padStart(2,"0");
  document.getElementById("f-month").value = `${now.getFullYear()}-${p(now.getMonth()+1)}`;
}

// リスト描画
async function loadList() {
  document.getElementById("list").innerHTML = '<div id="loading">読み込み中…</div>';

  const filters = {
    yearMonth: document.getElementById("f-month").value || null,
    type:      document.getElementById("f-type").value   || null,
    person:    document.getElementById("f-person").value || null,
  };

  try {
    const records = await fetchAllRecords(filters);

    const list = document.getElementById("list");
    list.innerHTML = "";

    if (records.length === 0) {
      list.innerHTML = "<p style='color:#999;font-size:14px;text-align:center;margin:20px 0;'>該当するデータはないよ。</p>";
      document.getElementById("bubble").innerHTML =
        (await getMessage("kakeibo","detail_empty")).text;
      setCharacterExpression("relax");
      return;
    }

    document.getElementById("bubble").innerHTML =
      (await getMessage("kakeibo","detail_show", null, { count: records.length })).text;
    setCharacterExpression("normal");
    
    records.forEach(r => {
      const isExp = r.type === "支出";
      const div = document.createElement("div");
      div.className = "detail-item";
      div.innerHTML = `
        <div class="detail-top">
          <div>
            <div class="detail-date">${r.date}　${r.person}</div>
            <div class="detail-desc">${r.description}</div>
            <div class="detail-meta">${r.category}${r.subcategory ? " › " + r.subcategory : ""}</div>
          </div>
          <div class="detail-right">
            <div class="detail-amount ${isExp?'expense':'income'}">${isExp?'−':'+'}${Number(r.amount).toLocaleString()}円</div>
            <button class="edit-btn" onclick="openEdit('${r.firestoreId}')">✏️ 編集</button>
          </div>
        </div>
      `;
      list.appendChild(div);
    });
  } catch(e) {
    document.getElementById("list").innerHTML = "<p style='color:#e74c3c;'>読み込みに失敗したよ。</p>";
    console.error(e);
  }
}

// 編集モーダルを開く
function openEdit(firestoreId) {
  // リスト中のデータからフォームに値をセット（再fetchを避けるため DOM から取得）
  editingFirestoreId = firestoreId;
  // 対応するカードのデータをDOMから読み取る代わりにFirestoreから取得
  db.collection("kakeibo").doc(firestoreId).get().then(doc => {
    if (!doc.exists) return;
    const r = doc.data();
    document.getElementById("m-date").value        = r.date;
    document.getElementById("m-type").value        = r.type;
    document.getElementById("m-category").value    = r.category;
    document.getElementById("m-subcategory").value = r.subcategory || "";
    document.getElementById("m-description").value = r.description;
    document.getElementById("m-amount").value      = r.amount;
    document.getElementById("m-person").value      = r.person;
    document.getElementById("modal-overlay").style.display = "block";
  });
}

function closeModal() {
  document.getElementById("modal-overlay").style.display = "none";
  editingFirestoreId = null;
}

function handleOverlayClick(e) {
  if (e.target === document.getElementById("modal-overlay")) closeModal();
}

async function saveEdit() {
  if (!editingFirestoreId) return;
  const data = {
    date:        document.getElementById("m-date").value,
    type:        document.getElementById("m-type").value,
    category:    document.getElementById("m-category").value,
    subcategory: document.getElementById("m-subcategory").value,
    description: document.getElementById("m-description").value,
    amount:      parseInt(document.getElementById("m-amount").value, 10),
    person:      document.getElementById("m-person").value,
  };
  try {
    await updateRecord(editingFirestoreId, data);
    closeModal();
    document.getElementById("bubble").innerHTML = (await getMessage("kakeibo","edit_saved")).text;
    setCharacterExpression("relax");
    loadList();
  } catch(e) {
    document.getElementById("bubble").innerHTML = (await getMessage("kakeibo","edit_error")).text;
    setCharacterExpression("hurry");
    console.error(e);
  }
}

async function confirmDelete() {
  if (!editingFirestoreId) return;
  if (!confirm("この項目を削除してもいい？")) return;
  try {
    await deleteRecordById(editingFirestoreId);
    closeModal();
    document.getElementById("bubble").innerHTML = (await getMessage("kakeibo","edit_deleted")).text;
    setCharacterExpression("normal");
    loadList();
  } catch(e) {
    document.getElementById("bubble").innerHTML = (await getMessage("kakeibo","edit_error")).text;
    setCharacterExpression("hurry");
    console.error(e);
  }
}

window.addEventListener("load", async () => {
  await importInitialDataIfNeeded();
  setDefaultMonth();
  loadList();
});
</script>
</body>
</html>
