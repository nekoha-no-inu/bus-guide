<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>バス時刻表</title>
<link rel="stylesheet" href="css/style.css">
<script src="js/common.js"></script>
<script src="js/timetable.js"></script>
</head>

<body>

<h2>🕒 バス時刻表</h2>
<a href="home.html" class="menu-btn">← ホームに戻る</a>

<!-- キャラ案内 -->
<div id="guide">
  <div id="leftBlock">
    <div id="bubble">どの路線の時刻表を見る？日付も選べるよ。</div>
    <img id="character" src="img/character_normal.png">
  </div>
</div>

<label>日付を選択：</label>
<input type="date" id="dateInput">

<button onclick="setToday()">今日に設定</button>

<label>出発バス停：</label>
<select id="stopSelect" onchange="updateGetoff()"></select>

<label>行先バス停：</label>
<select id="getoffSelect"></select>

<button onclick="loadTimetable()">時刻表を表示</button>

<div id="result"></div>

</body>
</html>
