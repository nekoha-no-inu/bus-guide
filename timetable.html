<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>バス時刻表</title>
<link rel="stylesheet" href="css/style.css">
<link rel="manifest" href="manifest.json">
</head>
<body>

<h2>🕒 バス時刻表</h2>
<a href="home.html" class="menu-btn">← ホームに戻る</a>

<div class="character-area">
  <div id="bubble" class="bubble">どの路線の時刻表を見る…？</div>
  <img id="character" src="img/character_normal.png" class="character">
</div>

<label>日付：</label>
<input type="date" id="dateInput">
<button onclick="setToday()">今日</button>

<label>バス停：</label>
<select id="stopSelect" onchange="updateDirection()"></select>

<label>方向：</label>
<select id="directionSelect"></select>

<button onclick="loadTimetable()">📋 時刻表を表示</button>

<div id="result"></div>

<script src="js/common.js"></script>
<script src="js/timetable.js"></script>
<script>
  if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("service-worker.js");
  }
</script>
</body>
</html>
