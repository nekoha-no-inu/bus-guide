<script>
async function loadLastUpdate() {
  try {
    const res = await fetch("https://api.github.com/repos/nekoha-no-inu/bus-guide/commits/main");
    const data = await res.json();

    const date = new Date(data.commit.committer.date);
    const formatted =
      `${date.getFullYear()}年${date.getMonth()+1}月${date.getDate()}日 `
      + `${date.getHours()}時${date.getMinutes()}分`;

    document.getElementById("lastUpdate").innerText =
      `最終更新：${formatted}`;

  } catch (e) {
    document.getElementById("lastUpdate").innerText =
      "最終更新：取得できませんでした";
  }
}

loadLastUpdate();
</script>


<body onload="initHome(); initCharacterImage();">
<div style="text-align: right;" id="lastUpdate">最終更新：取得中...</div>
<h2>お助けクロくん</h2>
